name: AI Supply Chain Audit

# Runs the deterministic scan (no LLM) on every PR and push to main.
#
# Gating semantics:
#   - On PRs: fail ONLY if the PR introduces NEW CRITICAL findings vs the
#     base branch. Pre-existing CRITICALs in the base do not block; that
#     would punish every PR for risks someone else introduced.
#   - On push to main: just record. Main might already have CRITICALs (e.g.,
#     this repo ships sample_project/ with planted vulnerabilities on purpose)
#     and failing every push is not useful.
#
# The right question is always "did this change make things worse?" — which
# is a question about DELTAS, not ABSOLUTES.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo (with history for base comparison)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ---------------------------------------------------------------
      # PR MODE — scan base, then PR, then delta-gate.
      # ---------------------------------------------------------------

      - name: Scan base branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}"
          git checkout "origin/${{ github.base_ref }}"
          python scan.py . --db audit.db | tee base.log

      - name: Scan PR branch
        if: github.event_name == 'pull_request'
        run: |
          git checkout "${{ github.sha }}"
          python scan.py . --db audit.db | tee pr.log

      - name: Compute severity delta (gate deferred)
        if: github.event_name == 'pull_request'
        id: delta
        continue-on-error: true
        run: |
          python findings_cli.py --db audit.db severity-delta 1 2 --threshold CRITICAL | tee delta.log

      - name: Build PR comment
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## AI Supply Chain Audit — PR vs \`${{ github.base_ref }}\`"
            echo ""
            echo "### Severity delta"
            echo '```'
            cat delta.log
            echo '```'
            echo ""
            echo "### Changes by tool"
            echo '```'
            python findings_cli.py --db audit.db diff 1 2
            echo '```'
            echo ""
            if [ "${{ steps.delta.outcome }}" = "failure" ]; then
              echo "> **This PR regressed at or above CRITICAL.** The check will block merge."
            else
              echo "> No regressions at or above CRITICAL."
            fi
            echo ""
            echo "_Deterministic scan — no LLM. See [\`scan.py\`](scan.py)._"
          } > comment.md
          cat comment.md

      - name: Upsert PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-supply-chain-audit
          path: comment.md

      - name: Enforce delta gate
        if: github.event_name == 'pull_request' && steps.delta.outcome == 'failure'
        run: |
          echo "This PR introduces new CRITICAL findings. Failing the check."
          exit 1

      # ---------------------------------------------------------------
      # PUSH-TO-MAIN MODE — just record; no gate.
      # ---------------------------------------------------------------

      - name: Scan main on push
        if: github.event_name == 'push'
        run: python scan.py . --db audit.db

      # ---------------------------------------------------------------
      # Upload the DB so you can download and inspect with
      # findings_cli.py locally. 30-day retention keeps history searchable.
      # ---------------------------------------------------------------

      - name: Upload audit DB as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-db-${{ github.run_id }}
          path: audit.db
          if-no-files-found: ignore
          retention-days: 30
